<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Textboard</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Textboard">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <h1>📋 Textboard</h1>
        <span id="board-label" class="board-label">🏠 Tablero principal</span>
      </div>
    </header>

    <div id="note-info" class="note-info hidden">
      <div class="note-info-row">
        <span class="note-icon">📝</span>
        <span id="note-text" class="note-text"></span>
      </div>
      <div class="note-info-row">
        <span class="note-icon">⏳</span>
        <span id="note-expiry" class="note-expiry"></span>
      </div>
      <span id="note-lock-icon" class="note-lock hidden">🔒</span>
    </div>

    <div id="locked-banner" class="locked-banner hidden">
      <span class="locked-banner-icon">🔒</span>
      <span class="locked-banner-text">Nota protegida — ingresa la contraseña para habilitar los controles</span>
      <button id="btn-unlock" class="btn btn-primary">🔑 Ingresar contraseña</button>
    </div>

    <div class="editor-wrapper">
      <textarea id="editor" placeholder="Escribe algo aquí..."></textarea>
      <div id="hidden-overlay" class="hidden-overlay hidden">
        <span class="hidden-overlay-icon">👁️</span>
        <span class="hidden-overlay-text">Haz clic para revelar el contenido</span>
      </div>
    </div>

    <div id="markdown-preview" class="markdown-preview hidden"></div>

    <div class="toolbar">
      <div class="toolbar-group">
        <div class="toolbar-label">📝 Texto</div>
        <div class="toolbar-buttons">
          <button id="btn-copy" class="btn" title="Copiar texto">📋 Copiar</button>
          <button id="btn-clear" class="btn btn-danger" title="Limpiar texto">🗑️ Limpiar</button>
          <button id="btn-download" class="btn btn-warning" title="Descargar contenido">💾 Descargar</button>
          <button id="btn-markdown" class="btn btn-purple" title="Vista previa Markdown">👁️ Markdown</button>
        </div>
      </div>

      <div class="toolbar-group">
        <div class="toolbar-label">🔗 Compartir</div>
        <div class="toolbar-buttons">
          <button id="btn-generate" class="btn btn-primary" title="Generar URL única">🔗 Generar URL</button>
          <button id="btn-share" class="btn btn-info" title="Compartir enlace" disabled>📤 Compartir</button>
          <button id="btn-qr" class="btn btn-info" title="Código QR" disabled>📱 QR</button>
        </div>
      </div>

      <div class="toolbar-group">
        <div class="toolbar-label">💾 Notas</div>
        <div class="toolbar-buttons">
          <button id="btn-save" class="btn btn-success" title="Guardar nota" disabled>💾 Guardar nota</button>
          <button id="btn-delete-note" class="btn btn-danger hidden" title="Eliminar nota">❌ Eliminar nota</button>
        </div>
      </div>
    </div>

    <div id="url-section" class="url-section hidden">
      <div class="url-input-wrapper">
        <span class="url-icon">🔗</span>
        <input id="generated-url" type="text" readonly>
      </div>
      <button id="btn-copy-url" class="btn btn-primary" title="Copiar URL">📋 Copiar URL</button>
    </div>

    <div id="qr-section" class="qr-section hidden">
      <div class="qr-wrapper">
        <img id="qr-image" alt="Código QR">
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-save">
      <div class="modal-header">
        <h3>💾 Guardar nota</h3>
        <button class="modal-close" id="modal-save-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="save-note">📝 Descripción</label>
          <input id="save-note" type="text" placeholder="Describe tu nota..." maxlength="200">
        </div>
        <div class="form-group">
          <label for="save-password">🔒 Contraseña (opcional)</label>
          <input id="save-password" type="password" placeholder="Proteger con contraseña">
        </div>
        <div class="form-group">
          <label for="save-password-confirm">🔐 Confirmar contraseña</label>
          <input id="save-password-confirm" type="password" placeholder="Repite la contraseña">
        </div>
        <div class="form-group">
          <label for="save-ttl">⏰ Tiempo disponible</label>
          <select id="save-ttl">
            <option value="300">⚡ 5 minutos</option>
            <option value="900">⚡ 15 minutos</option>
            <option value="1800">⚡ 30 minutos</option>
            <option value="3600" selected>🕐 1 hora</option>
            <option value="7200">🕑 2 horas</option>
            <option value="14400">🕓 4 horas</option>
            <option value="28800">🕗 8 horas</option>
            <option value="43200">🕛 12 horas</option>
            <option value="86400">📅 1 día</option>
            <option value="172800">📅 2 días</option>
            <option value="604800">📅 7 días</option>
            <option value="1209600">📅 14 días</option>
            <option value="2592000">📅 30 días</option>
          </select>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input id="save-hidden-access" type="checkbox">
            <span>🙈 Ocultar contenido al acceder (revelar con clic)</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-save-cancel" class="btn">Cancelar</button>
        <button id="modal-save-confirm" class="btn btn-success">💾 Guardar</button>
      </div>
    </div>

    <div class="modal hidden" id="modal-password">
      <div class="modal-header">
        <h3>🔒 Nota protegida</h3>
        <button class="modal-close" id="modal-unlock-close">✕</button>
      </div>
      <div class="modal-body">
        <p>Ingresa la contraseña para desbloquear los controles de esta nota.</p>
        <div class="form-group">
          <label for="unlock-password">🔑 Contraseña</label>
          <input id="unlock-password" type="password" placeholder="Ingresa la contraseña">
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-unlock-cancel" class="btn">Cancelar</button>
        <button id="modal-unlock-confirm" class="btn btn-primary">🔓 Desbloquear</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
